# ==================== 独立部署：仅 WeRSS 应用容器 ====================
# 适用：已有 PostgreSQL / MinIO（或主栈 deepling 等），不需要本文件再起一套库。
# 使用：docker compose -f docker-compose.standalone.yml up -d --build
#
# 与 docker-compose.dev.yml 的区别：
# - 不包含 postgres、minio，不占宿主机 5432 / 9000
# - 不强制 DEBUG=True、不覆盖 DB / MinIO（全部从 .env 读取）
# - 提供 host.docker.internal，便于容器访问「跑在宿主机上」的数据库
#
# 数据库主机名请按实际修改 .env 中的 DB（及 DATABASE_URL 等）：
# - 与主栈 Postgres 在同一 Docker 网络：用服务名，如 postgres:5432，并见 docs/DOCKER_STANDALONE.md 接入 external network
# - Postgres 仅映射在宿主机 5432：DB=...@host.docker.internal:5432/...
#
# 若前面有 Traefik：可注释掉 ports，给 werss 加 labels 并加入 Traefik 所在 external network（文中有示例）。

services:
  werss:
    build:
      context: .
      dockerfile: Dockerfile.cn
      args:
        - BROWSER_TYPE=${BROWSER_TYPE:-firefox}
    container_name: ${WERSS_CONTAINER_NAME:-werss}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PLAYWRIGHT_DOWNLOAD_HOST: https://npmmirror.com/mirrors/playwright
    volumes:
      - ${WERSS_DATA_DIR:-./data/werss-data}:/app/data
      - ${WERSS_LOGS_DIR:-./logs}:/app/logs
    ports:
      - "${WERSS_PUBLISH_PORT:-8001}:8001"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - werss_standalone

networks:
  werss_standalone:
    driver: bridge
    name: werss_standalone

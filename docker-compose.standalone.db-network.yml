# 可选叠加：让 werss 加入「已有 Postgres 容器」所在的 Docker 网络，用服务名 postgres 连库。
# 适用：主栈把 Postgres 映射成 127.0.0.1:5432:5432 时，host.docker.internal 会 connection refused。
#
# 使用：
#   export WERSS_DB_DOCKER_NETWORK=deeplingtech_network   # docker inspect postgres 看 Networks
#   docker compose -f docker-compose.standalone.yml -f docker-compose.standalone.db-network.yml up -d
# .env 中 DB / DATABASE_URL 等主机名改为 postgres（端口 5432）。

services:
  werss:
    networks:
      werss_db_peer:

networks:
  werss_db_peer:
    external: true
    name: ${WERSS_DB_DOCKER_NETWORK:-deeplingtech_network}

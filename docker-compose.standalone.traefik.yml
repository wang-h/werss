# 叠加在 docker-compose.standalone.yml 上：把 werss 挂进「现有 Traefik」所在 Docker 网络并声明 HTTPS 路由。
#
# 用法（变量可写在 shell 或 .env）：
#   export WERSS_TRAEFIK_NETWORK=traefik          # docker inspect <traefik容器> → Networks 里选一个
#   export WERSS_HOST=werss.example.com
#   export WERSS_TLS_RESOLVER=letsencrypt       # 与 Traefik 静态配置里 certresolver 名称一致
#   docker compose -f docker-compose.standalone.yml -f docker-compose.standalone.traefik.yml up -d
#
# 建议：由 Traefik 对外提供 HTTPS 时，在 standalone 主文件里注释掉 werss 的 ports，减少重复暴露。
# HTTP→HTTPS 若主栈已全局配置，无需再给 werss 单独加 middleware。

services:
  werss:
    networks:
      traefik_edge:
    labels:
      - traefik.enable=true
      - traefik.http.routers.werss.rule=Host(`${WERSS_HOST:-werss.example.com}`)
      - traefik.http.routers.werss.entrypoints=websecure
      - traefik.http.routers.werss.tls.certresolver=${WERSS_TLS_RESOLVER:-letsencrypt}
      - traefik.http.services.werss.loadbalancer.server.port=8001

networks:
  traefik_edge:
    external: true
    name: ${WERSS_TRAEFIK_NETWORK:-traefik}

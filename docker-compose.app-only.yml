# ==================== WeRSS 仅应用容器 ====================
# 适用于已有外部 PostgreSQL / MinIO 的环境（子项目、生产集群等）。
# 所有外部服务坐标从 .env 读取。
#
# 基本用法（独立部署，先创建默认网络）：
#   docker network create werss_app 2>/dev/null || true
#   docker compose -f docker-compose.app-only.yml up -d --build
#
# 加入已有 Docker 网络（如 Postgres 或 Traefik 所在网络）：
#   WERSS_EXTERNAL_NETWORK=your_network_name docker compose -f docker-compose.app-only.yml up -d
# 
# 启用 Traefik HTTPS 路由：
#   在 .env 中设置 WERSS_TRAEFIK_ENABLE=true, WERSS_HOST, WERSS_TLS_RESOLVER,
#   并将 WERSS_EXTERNAL_NETWORK 设为 Traefik 所在网络名。
#
# 详细说明见 docs/DEPLOYMENT.md

services:
  werss:
    build:
      context: .
      dockerfile: Dockerfile.cn
      args:
        - BROWSER_TYPE=${BROWSER_TYPE:-firefox}
    container_name: ${WERSS_CONTAINER_NAME:-werss}
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ${WERSS_DATA_DIR:-./data/werss-data}:/app/data
      - ${WERSS_LOGS_DIR:-./logs}:/app/logs
    ports:
      - "${WERSS_PUBLISH_PORT:-8001}:8001"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    labels:
      - traefik.enable=${WERSS_TRAEFIK_ENABLE:-false}
      - traefik.http.routers.werss.rule=Host(`${WERSS_HOST:-localhost}`)
      - traefik.http.routers.werss.entrypoints=${WERSS_ENTRYPOINTS:-websecure}
      - traefik.http.routers.werss.tls.certresolver=${WERSS_TLS_RESOLVER:-letsencrypt}
      - traefik.http.services.werss.loadbalancer.server.port=8001
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - werss_net

networks:
  werss_net:
    external: true
    name: ${WERSS_EXTERNAL_NETWORK:-werss_app}
